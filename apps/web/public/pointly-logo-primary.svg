<svg width="680" height="320" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pointly logo">
  <title>Pointly</title>
  <desc>Fanned trio of estimation cards with a featured "5" card, paired with the lowercase wordmark "pointly".</desc>

  <style>
    .card-back { fill: #6366F1; }
    .card-mid { fill: #818CF8; }
    .card-front { fill: #FFFFFF; stroke: #0F172A; stroke-width: 4; }
    .num { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 56px; font-weight: 500; fill: #0F172A; }
    .num-sm { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: 500; fill: #0F172A; }
    .word { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 84px; font-weight: 500; fill: #0F172A; letter-spacing: -3px; }

    @media (prefers-color-scheme: dark) {
      .card-front { fill: #F8FAFC; stroke: #F8FAFC; }
      .word { fill: #F8FAFC; }
    }
  </style>

  <g transform="translate(160, 170)">
    <g transform="rotate(-18) translate(-40, 0)">
      <rect class="card-back" x="-50" y="-75" width="100" height="150" rx="10"/>
    </g>
    <g transform="rotate(-6) translate(-10, -10)">
      <rect class="card-mid" x="-50" y="-75" width="100" height="150" rx="10"/>
    </g>
    <g transform="translate(30, -20)">
      <rect class="card-front" x="-50" y="-75" width="100" height="150" rx="10"/>
      <text class="num-sm" x="-38" y="-48" text-anchor="start">5</text>
      <text class="num" x="0" y="18" text-anchor="middle">5</text>
      <text class="num-sm" x="38" y="62" text-anchor="end" transform="rotate(180, 38, 56)">5</text>
    </g>
  </g>

  <text class="word" x="290" y="205">pointly</text>
</svg>
